<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drive Uploader</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #22222e;
      --accent: #5b8cff;
      --accent2: #a78bfa;
      --success: #34d399;
      --error: #f87171;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --glow: rgba(91,140,255,0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,140,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,140,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, rgba(91,140,255,0.07) 0%, transparent 65%);
      z-index: 0;
      pointer-events: none;
      animation: driftBlob 18s ease-in-out infinite alternate;
    }

    @keyframes driftBlob {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(15vw, 10vh) scale(1.1); }
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      gap: 32px;
    }

    /* Header */
    header {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeDown 0.6s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 18px var(--glow);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    /* Auth button */
    #authBtn {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    #authBtn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
    }

    #authBtn.signed-in {
      border-color: var(--success);
      color: var(--success);
    }

    /* Status pill */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      animation: fadeDown 0.6s 0.1s ease both;
      opacity: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot.error  { background: var(--error);   box-shadow: 0 0 6px var(--error); }

    /* Drop zone */
    .dropzone-wrapper {
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.7s 0.2s ease both;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #dropzone {
      width: 100%;
      min-height: 220px;
      border: 2px dashed var(--border);
      border-radius: 20px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    #dropzone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 100%, rgba(91,140,255,0.06), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #dropzone.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--glow), inset 0 0 40px rgba(91,140,255,0.05);
    }

    #dropzone.drag-over::before { opacity: 1; }

    #dropzone.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .drop-icon {
      font-size: 40px;
      filter: grayscale(0.3);
      transition: transform 0.3s;
    }

    #dropzone.drag-over .drop-icon {
      transform: scale(1.15) translateY(-4px);
    }

    .drop-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
      text-align: center;
    }

    .drop-sub {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .drop-browse {
      font-size: 12px;
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }

    #fileInput { display: none; }

    /* Upload queue */
    .queue-wrapper {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.7s 0.35s ease both;
      opacity: 0;
    }

    .queue-header {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .file-type-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 3px 7px;
      border-radius: 6px;
      background: rgba(91,140,255,0.12);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-status {
      font-size: 11px;
      flex-shrink: 0;
    }

    .file-status.pending  { color: var(--muted); }
    .file-status.uploading { color: var(--accent); }
    .file-status.done      { color: var(--success); }
    .file-status.error     { color: var(--error); }

    /* Progress bar inside card */
    .progress-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Stats row */
    .stats-row {
      width: 100%;
      max-width: 560px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      animation: fadeUp 0.7s 0.45s ease both;
      opacity: 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--text);
    }

    .stat-value.green { color: var(--success); }
    .stat-value.blue  { color: var(--accent); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 13px;
      color: var(--text);
      z-index: 100;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--error);   color: var(--error); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">☁️</div>
      <div class="logo-text">Drive<span>Drop</span></div>
    </div>
    <button id="authBtn" onclick="handleAuth()">Sign in with Google</button>
  </header>

  <div class="status-pill" id="statusPill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Not signed in</span>
  </div>

  <div class="dropzone-wrapper">
    <div id="dropzone" class="disabled"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)"
         onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">📂</div>
      <div class="drop-title">Drop files here</div>
      <div class="drop-sub">
        Drag &amp; drop any file to upload it to your Google Drive<br/>
        <span class="drop-browse">or tap to browse</span>
      </div>
      <input type="file" id="fileInput" multiple onchange="onFileSelect(event)"/>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Queued</div>
      <div class="stat-value blue" id="statQueued">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Uploaded</div>
      <div class="stat-value green" id="statDone">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Size</div>
      <div class="stat-value" id="statSize">0 MB</div>
    </div>
  </div>

  <div class="queue-wrapper" id="queueWrapper" style="display:none;">
    <div class="queue-header">Upload Queue</div>
    <div id="fileList"></div>
  </div>

</div>

<div id="toast"></div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
  const CLIENT_ID = '454687705679-4fnmgiq995h34t5rti2i93la2q2s4ejh.apps.googleusercontent.com';
  const SCOPES = 'https://www.googleapis.com/auth/drive.file';

  let accessToken = null;
  let uploadedCount = 0;
  let totalBytes = 0;

  // ── Auth ──────────────────────────────────────────────
  function handleAuth() {
    if (accessToken) { signOut(); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { showToast('Auth failed: ' + resp.error, 'error'); return; }
        accessToken = resp.access_token;
        setSignedIn(true);
      }
    });
    client.requestAccessToken();
  }

  function signOut() {
    if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
    accessToken = null;
    setSignedIn(false);
  }

  function setSignedIn(yes) {
    const btn  = document.getElementById('authBtn');
    const dot  = document.getElementById('statusDot');
    const txt  = document.getElementById('statusText');
    const zone = document.getElementById('dropzone');

    if (yes) {
      btn.textContent = 'Sign out';
      btn.classList.add('signed-in');
      dot.classList.add('active');
      txt.textContent = 'Connected to Google Drive';
      zone.classList.remove('disabled');
      showToast('Signed in! Ready to upload ✓', 'success');
    } else {
      btn.textContent = 'Sign in with Google';
      btn.classList.remove('signed-in');
      dot.classList.remove('active');
      dot.classList.remove('error');
      txt.textContent = 'Not signed in';
      zone.classList.add('disabled');
    }
  }

  // ── Drag & Drop ───────────────────────────────────────
  function onDragOver(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.add('drag-over');
  }

  function onDragLeave(e) {
    document.getElementById('dropzone').classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    document.getElementById('dropzone').classList.remove('drag-over');
    handleFiles([...e.dataTransfer.files]);
  }

  function onFileSelect(e) {
    handleFiles([...e.target.files]);
    e.target.value = '';
  }

  // ── File handling ─────────────────────────────────────
  function handleFiles(files) {
    if (!accessToken) { showToast('Please sign in first', 'error'); return; }
    if (!files.length) return;

    document.getElementById('queueWrapper').style.display = 'flex';

    files.forEach(file => {
      totalBytes += file.size;
      updateStats();
      const cardId = 'card-' + Date.now() + Math.random().toString(36).slice(2);
      addFileCard(cardId, file);
      uploadFile(file, cardId);
    });
  }

  function addFileCard(id, file) {
    const ext = file.name.split('.').pop().toUpperCase().slice(0, 5) || 'FILE';
    const size = formatBytes(file.size);
    const list = document.getElementById('fileList');

    const card = document.createElement('div');
    card.className = 'file-card';
    card.id = id;
    card.innerHTML = `
      <div class="file-type-badge">${ext}</div>
      <div class="file-info">
        <div class="file-name">${file.name}</div>
        <div class="file-size">${size}</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bar-${id}"></div></div>
      </div>
      <div class="file-status pending" id="status-${id}">pending</div>
    `;
    list.prepend(card);
    updateStats();
  }

  // ── Upload ────────────────────────────────────────────
  function uploadFile(file, cardId) {
    const statusEl = document.getElementById('status-' + cardId);
    const barEl    = document.getElementById('bar-' + cardId);

    statusEl.textContent = 'uploading';
    statusEl.className   = 'file-status uploading';

    const metadata = { name: file.name, mimeType: file.type || 'application/octet-stream' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', file);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
    xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        barEl.style.width = pct + '%';
      }
    };

    xhr.onload = () => {
      if (xhr.status === 200 || xhr.status === 201) {
        statusEl.textContent = 'done ✓';
        statusEl.className   = 'file-status done';
        barEl.style.width    = '100%';
        uploadedCount++;
        updateStats();
        showToast(`${file.name} uploaded!`, 'success');
      } else {
        statusEl.textContent = 'error';
        statusEl.className   = 'file-status error';
        showToast('Upload failed for ' + file.name, 'error');
      }
    };

    xhr.onerror = () => {
      statusEl.textContent = 'error';
      statusEl.className   = 'file-status error';
      showToast('Network error', 'error');
    };

    xhr.send(form);
  }

  // ── Helpers ───────────────────────────────────────────
  function updateStats() {
    const cards = document.getElementById('fileList').children.length;
    document.getElementById('statQueued').textContent = cards;
    document.getElementById('statDone').textContent   = uploadedCount;
    document.getElementById('statSize').textContent   = formatBytes(totalBytes);
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }
</script>
</body>
</html>
