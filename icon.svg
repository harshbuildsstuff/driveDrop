<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0a2a6e"/>
      <stop offset="100%" stop-color="#01030d"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(74,158,255,0.35)" stroke-width="1"/>
  <rect x="1" y="1" width="30" height="1.5" rx="0.75" fill="rgba(255,255,255,0.06)"/>

  <circle cx="5"  cy="5"  r="0.8" fill="#7ec8ff" opacity="0.6"/>
  <circle cx="27" cy="6"  r="0.6" fill="#ffffff"  opacity="0.4"/>
  <circle cx="28" cy="26" r="0.7" fill="#a5f3fc"  opacity="0.5"/>
  <circle cx="4"  cy="27" r="0.5" fill="#ffffff"  opacity="0.3"/>

  <text x="16" y="15" font-size="18" text-anchor="middle" dominant-baseline="middle"
        filter="url(#glow)">🛸</text>

  <rect x="3" y="24" width="26" height="6.5" rx="2"
        fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.22)" stroke-width="0.5"/>

  <text x="8.5" y="27.4" font-size="4.8" text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-weight="bold" letter-spacing="0"
        fill="rgba(0,212,255,0.75)">DD</text>

  <line x1="14.5" y1="24.4" x2="14.5" y2="30.6" stroke="rgba(0,212,255,0.2)" stroke-width="0.4"/>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="0.9">
    <line x1="18"   y1="27.8" x2="18"   y2="25.2" stroke="#ff3b30"/>
    <line x1="18"   y1="27.8" x2="16.6" y2="26.4" stroke="#ff3b30"/>
    <line x1="18"   y1="27.8" x2="19.4" y2="26.4" stroke="#ff3b30"/>

    <line x1="21.5" y1="25.2" x2="21.5" y2="27.8" stroke="#30d158"/>
    <line x1="21.5" y1="25.2" x2="20.1" y2="26.6" stroke="#30d158"/>
    <line x1="21.5" y1="25.2" x2="22.9" y2="26.6" stroke="#30d158"/>
  </g>
</svg>

